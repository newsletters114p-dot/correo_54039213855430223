name: Actualizar GW diario

on:
  schedule:
    # 22:48 UTC = 00:48 hora española (CEST / Verano)
    # Cambiar a '48 23 * * 1-5' cuando cambie a horario de invierno (CET)
    - cron: '48 22 * * 1-5'
  workflow_dispatch:
    # Mantiene la opción de ejecutarlo manualmente desde GitHub si lo necesitas

permissions:
  contents: write

jobs:
  actualizar:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Instalar dependencias
        run: pip install yfinance

      - name: Restaurar DB desde cache
        uses: actions/cache@v4
        with:
          path: data/graficos.db
          key: graficos-db-${{ github.run_id }}
          restore-keys: |
            graficos-db-

      - name: Ejecutar actualizar.py
        run: python actualizar.py

      - name: Commit y push del HTML actualizado
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/index.html
          
          # Guarda cambios solo si index.html ha cambiado realmente
          if ! git diff --staged --quiet; then
            git pull --rebase
            git commit -m "📊 Actualización automática $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          else
            echo "No hay cambios en docs/index.html para guardar."
          fi
