name: Actualizar GW diario

on:
  schedule:
    # 18:17 UTC = 20:17 CEST (Hora española)
    - cron: '17 18 * * 0-5'

permissions:
  contents: write

jobs:
  actualizar:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Instalar dependencias
        run: pip install yfinance

      - name: Restaurar DB desde cache
        uses: actions/cache@v4
        with:
          path: data/graficos.db
          key: graficos-db-${{ github.run_id }}
          restore-keys: |
            graficos-db-

      - name: Ejecutar actualizar.py
        run: python actualizar.py

      - name: Commit y push del HTML actualizado
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/index.html
          git diff --staged --quiet || (git commit -m "📊 Actualización automática $(date -u +'%Y-%m-%d %H:%M UTC')" && git stash --include-untracked && git pull --rebase && git stash pop && git push)
